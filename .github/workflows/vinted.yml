name: Bot Vinted

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bot-vinted
  cancel-in-progress: false

jobs:
  controllo:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Prepara Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Esegui un controllo
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python run_once.py

      - name: Salva la memoria
        run: |
          git config user.name "bot-vinted"
          git config user.email "bot@users.noreply.github.com"
          git add visti.json
          git commit -m "aggiorno memoria affari" || echo "niente da salvare"
          git push || echo "niente da inviare"
